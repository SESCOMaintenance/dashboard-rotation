<!DOCTYPE html>
<html>
<head>
<title>Dashboard Rotation</title>

<script>
const pages = [
"https://app.onupkeep.com/web/analytics/dashboard/23693",
"https://app.onupkeep.com/web/analytics/dashboard/23710",
"https://app.onupkeep.com/web/analytics/dashboard/23711",
"https://app.onupkeep.com/web/analytics/dashboard/23715",
"https://app.onupkeep.com/web/analytics/dashboard/23826",
"https://app.onupkeep.com/web/analytics/dashboard/23674",
"https://app.onupkeep.com/web/analytics/dashboard/24412"
];

let index = 0;
let duration = 300; // 5 minutes
let refreshInterval = 60;

function goToNext() {
    localStorage.setItem("index", index);
    window.location.href = pages[index];
}

function startRotation() {
    index = parseInt(localStorage.getItem("index")) || 0;

    // show timer
    let timeLeft = duration;

    setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText =
            "Next in: " + timeLeft + "s";

        if (timeLeft <= 0) {
            index = (index + 1) % pages.length;
            localStorage.setItem("index", index);
            window.location.href = pages[index];
        }
    }, 1000);

    // refresh page every X seconds
    setInterval(() => {
        location.reload();
    }, refreshInterval * 1000);
}

// Start after slight delay (important for FireStick)
setTimeout(goToNext, 3000);

</script>

</head>

<body onload="startRotation()" style="margin:0">

<div id="timer" style="
position:fixed;
bottom:10px;
left:10px;
background:black;
color:white;
padding:10px;
font-size:20px;
z-index:9999;">
Starting...
</div>

</body>
</html>
