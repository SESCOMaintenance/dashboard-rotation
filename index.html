<!DOCTYPE html>
<html>
<head>
<title>Dashboard Rotation</title>

<script>

const pages = [
"https://app.onupkeep.com/web/analytics/dashboard/23693",
"https://app.onupkeep.com/web/analytics/dashboard/23710",
"https://app.onupkeep.com/web/analytics/dashboard/23711",
"https://app.onupkeep.com/web/analytics/dashboard/23715",
"https://app.onupkeep.com/web/analytics/dashboard/23826",
"https://app.onupkeep.com/web/analytics/dashboard/23674",
"https://app.onupkeep.com/web/analytics/dashboard/24412"
];

let index = 0;

function rotate() {
    document.getElementById("status").innerText =
        "Opening dashboard: " + pages[index];

    window.location.href = pages[index];

    index = (index + 1) % pages.length;
}

setTimeout(rotate, 2000); // start after 2 seconds
setInterval(() => location.reload(), 5000);

</script>

</head>

<body style="font-family:Arial;text-align:center;margin-top:100px">

<h1>Dashboard Rotation Starting...</h1>
<p id="status">Loading first dashboard...</p>

</body>
</html>
