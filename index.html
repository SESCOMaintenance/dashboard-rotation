<!DOCTYPE html>
<html>
<head>
<title>Dashboard Rotation</title>

<script>

const pages = [
"https://app.onupkeep.com/web/analytics/dashboard/23693",
"https://app.onupkeep.com/web/analytics/dashboard/23710",
"https://app.onupkeep.com/web/analytics/dashboard/23711",
"https://app.onupkeep.com/web/analytics/dashboard/23715",
"https://app.onupkeep.com/web/analytics/dashboard/23826",
"https://app.onupkeep.com/web/analytics/dashboard/23674",
"https://app.onupkeep.com/web/analytics/dashboard/24412"
];

// store index in browser so it survives page changes
let index = localStorage.getItem("rotationIndex") || 0;
index = parseInt(index);

// save next index BEFORE leaving
let nextIndex = (index + 1) % pages.length;
localStorage.setItem("rotationIndex", nextIndex);

// schedule next rotation BEFORE navigating away
setTimeout(() => {
    window.location.href = window.location.origin;
}, 300000); // 5 minutes

// force refresh every 60 seconds
setInterval(() => location.reload(), 60000);

// go to dashboard
setTimeout(() => {
    window.location.href = pages[index];
}, 2000);

</script>

</head>
<body>
<h2 style="text-align:center;margin-top:100px;">Starting Dashboard Rotation...</h2>
</body>
</html>
